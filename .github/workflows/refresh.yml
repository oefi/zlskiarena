name: Refresh Ski Dashboard

on:
  schedule:
    # Forecast data: every 6 hours (model updates 4×/day)
    # Historical ERA5-Land has a 5-7 day lag — daily rebuild is plenty
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      end_date:
        description: "Override fetch end date (YYYY-MM-DD)"
        required: false
        default: ""
      force:
        description: "Force rebuild"
        required: false
        default: "false"
        type: boolean
  push:
    branches: [main]
    paths:
      - "dashboard_template.html"
      - "scripts/**.py"
      - "build_dashboard.py"
      - ".github/workflows/refresh.yml"

permissions:
  contents: read      # no longer writing commits to main
  pages: write        # upload Pages artifact
  id-token: write     # required by actions/deploy-pages

concurrency:
  group: refresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    name: Fetch → Build Dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Processed Data
        uses: actions/cache@v4
        with:
          path: data/
          key: ski-data-${{ hashFiles('scripts/clean_normalize.py', 'scripts/fetch_openmeteo.py', 'scripts/fetch_forecast.py', 'scripts/compute_metrics.py') }}-${{ github.run_id }}
          restore-keys: |
            ski-data-${{ hashFiles('scripts/clean_normalize.py', 'scripts/fetch_openmeteo.py', 'scripts/fetch_forecast.py', 'scripts/compute_metrics.py') }}-
            ski-data-

      - name: Refresh data and rebuild
        id: refresh
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            ARGS="$ARGS --end-date ${{ github.event.inputs.end_date }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python3 scripts/action_refresh.py $ARGS

      - name: Prepare Pages artifact
        if: steps.refresh.outputs.DASHBOARD_CHANGED == 'true'
        run: |
          mkdir -p _site
          mv nauders_dashboard.html _site/index.html
          # og-image lives at repo root; copy if present
          [ -f og-image.png ] && cp og-image.png _site/og-image.png || true
          echo "Dashboard built through: ${{ steps.refresh.outputs.BAKED_THROUGH }}"

      - name: Upload Pages artifact
        if: steps.refresh.outputs.DASHBOARD_CHANGED == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        if: steps.refresh.outputs.DASHBOARD_CHANGED == 'true'
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Log no-op
        if: steps.refresh.outputs.DASHBOARD_CHANGED != 'true'
        run: echo "No dashboard updates required."
