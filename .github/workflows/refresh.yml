name: Refresh Ski Dashboard

on:
  schedule:
    # Forecast data: every 6 hours (model updates 4×/day)
    # Historical ERA5-Land has a 5-7 day lag — daily rebuild is plenty
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      end_date:
        description: "Override fetch end date (YYYY-MM-DD)"
        required: false
        default: ""
      force:
        description: "Force rebuild"
        required: false
        default: "false"
        type: boolean
  push:
    branches: [main]
    paths:
      - "dashboard_template.html"
      - "scripts/**.py"
      - "build_dashboard.py"
      - ".github/workflows/refresh.yml"

permissions:
  contents: write

concurrency:
  group: refresh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    name: Fetch → Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Processed Data
        uses: actions/cache@v4
        with:
          path: data/
          key: ski-data-${{ hashFiles('scripts/clean_normalize.py') }}-${{ github.run_id }}
          restore-keys: |
            ski-data-${{ hashFiles('scripts/clean_normalize.py') }}-
            ski-data-

      - name: Refresh data and rebuild
        id: refresh
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            ARGS="$ARGS --end-date ${{ github.event.inputs.end_date }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python3 scripts/action_refresh.py $ARGS

      - name: Rename output for GitHub Pages
        if: steps.refresh.outputs.DASHBOARD_CHANGED == 'true'
        run: |
          mv nauders_dashboard.html index.html
          echo "Dashboard built through: ${{ steps.refresh.outputs.BAKED_THROUGH }}"

      - name: Commit and push updated dashboard
        if: steps.refresh.outputs.DASHBOARD_CHANGED == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html og-image.png
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: refresh dashboard through ${{ steps.refresh.outputs.BAKED_THROUGH }} [skip ci]"
          git push

      - name: Log no-op
        if: steps.refresh.outputs.DASHBOARD_CHANGED != 'true'
        run: echo "No dashboard updates required."
